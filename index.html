<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyprOS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f14;
      color: #e0e0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 2rem;
      box-shadow: 0 8px 40px rgba(124, 58, 237, .35);
    }
    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      font-size: 1.15rem;
      color: #999;
      margin-top: .75rem;
      max-width: 480px;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: .5rem 1.25rem;
      border: 1px solid #333;
      border-radius: 999px;
      font-size: .85rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    footer {
      margin-top: 4rem;
      font-size: .8rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="logo">H</div>
  <h1>HyprOS</h1>
  <p>An Arch Linux distribution built around the Hyprland Wayland compositor.</p>
  <div class="badge">Coming soon</div>
  <footer>&copy; 2026 HyprOS</footer>
</body>
</html>
